name: Reusable Maven Build

on:
  workflow_call:
    inputs:
      maven_args:
        description: 'Extra arguments for the Maven package command (e.g. -f pom-dev.xml)'
        type: string
        default: ''
      java_version:
        description: 'Java version(s) to install. Use a multiline string for multiple versions.'
        type: string
        default: '21'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ inputs.java_version }}
          server-id: ossrh
          settings-path: ${{ github.workspace }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Create settings.xml
        uses: s4u/maven-settings-action@v3.0.0
        with:
          githubServer: false
      - name: Configure Maven repository filters
        run: |
          mkdir -p ~/.m2/repository/.remoteRepositoryFilters
          printf 'com.github.FrancoBM12\ncom.github.MilkBowl\ncom.github.Pwing-Minecraft\ncom.github.Realizedd\ncom.github.TechFortress\ncom.github.Zrips\ncom.github.angeschossen\ncom.github.cryptomorin\ncom.github.nikosgram\ncom.github.retrooper\ncom.github.shynixn.structureblocklib\ncom.github.stefvanschie.inventoryframework\n' > ~/.m2/repository/.remoteRepositoryFilters/groupId-jitpack.io.txt
          echo 'dev.lone' > ~/.m2/repository/.remoteRepositoryFilters/groupId-matteodev.txt
          printf 'studio.magemonkey\nfr.neatmonster\n' > ~/.m2/repository/.remoteRepositoryFilters/groupId-magemonkey-snapshots.txt
          echo 'studio.magemonkey' > ~/.m2/repository/.remoteRepositoryFilters/groupId-magemonkey-releases.txt
      - name: Build with Maven
        run: mvn clean package -e -Daether.remoteRepositoryFilter.groupId=true ${{ inputs.maven_args }}
