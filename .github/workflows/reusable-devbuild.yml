name: Reusable Dev Build

on:
  workflow_call:
    inputs:
      maven_args:
        description: 'Extra arguments to pass to the Maven deploy command (e.g. -f pom-dev.xml)'
        type: string
        default: ''
      artifact_filter:
        description: 'Regex fragment to filter artifact ID for multi-module builds'
        type: string
        default: '.*?'
      update_javadocs:
        description: 'Whether to update the editor branch javadocs after building'
        type: boolean
        default: false
    secrets:
      ACTIONS_PAT:
        required: true
      REPO_USERNAME:
        required: true
      DEPLOY_KEY:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true
      WEBHOOK_URLS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout repo
        with:
          token: ${{ secrets.ACTIONS_PAT }}
      - name: Configure git
        run: |
          git config user.name "Build Monkey"
          git config user.email "<>"
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
          server-id: ossrh
          settings-path: ${{ github.workspace }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Create settings.xml
        uses: s4u/maven-settings-action@v3.0.0
        with:
          githubServer: false
          servers: '[{"id": "magemonkey-repo", "username": "${{ secrets.REPO_USERNAME }}", "password": "${{ secrets.DEPLOY_KEY }}"}]'
      - name: Publish to Travja Repo
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn clean deploy ${{ inputs.maven_args }} -P gpg,publish -DcreateChecksum=true 2>&1 | tee log.txt
          result_code=${PIPESTATUS[0]}
          exit $result_code
      - name: Tag release version
        run: |
          version=$(mvn org.apache.maven.plugins:maven-help-plugin:3.1.0:evaluate -Dexpression=project.version -q -DforceStdout)
          git tag -a $version -m "Dev $version"
      - uses: actions/checkout@v4
        name: Checkout editor branch
        if: inputs.update_javadocs
        with:
          ref: editor
          path: editor
          token: ${{ secrets.ACTIONS_PAT }}
      - name: Update Javadocs
        if: inputs.update_javadocs
        run: |
          rm -rf editor/static/javadocs
          cp -r gh-pages/apidocs/ editor/static/javadocs/
          cd editor
          git add .
          git commit -m "Update javadocs"
          git push
      - name: Update version
        run: python ./.github/update_version.py true
      - name: Push to git
        run: |
          git add .
          git reset settings.xml log.txt toolchains.xml
          git commit -m "[ci skip] Update dev version"
          git push
          git push --tags
      - name: Notify Discord
        uses: magemonkeystudio/.github/actions/notify-discord@main
        with:
          webhook_urls: ${{ secrets.WEBHOOK_URLS }}
          is_dev: 'true'
          artifact_filter: ${{ inputs.artifact_filter }}
